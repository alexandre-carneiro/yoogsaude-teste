services:
  db:
    image: postgres:16-alpine
    container_name: yoog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yoogsaude_crm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yoog-backend
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/yoogsaude_crm?schema=public
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:

